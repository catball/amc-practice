<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 8 Master Training Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f4f8; }
        header { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 2rem; text-align: center; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .sticky-stats { position: sticky; top: 10px; z-index: 100; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #dcdde1; text-align: center; }
        .timer-display { font-size: 1.5rem; font-weight: bold; color: #e67e22; }
        
        .progress-bg { background: #eee; border-radius: 20px; height: 15px; width: 100%; overflow: hidden; margin: 8px 0; }
        .progress-fill { background: #27ae60; height: 100%; width: 0%; transition: width 0.5s ease; }
        
        h2 { color: #2c3e50; background: #ecf0f1; padding: 10px 15px; border-radius: 8px; margin-top: 40px; border-left: 5px solid #3498db; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .question-block { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ddd; }
        .question-text { font-weight: 600; font-size: 1.1rem; color: #2c3e50; display: block; margin-bottom: 12px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .option-btn { background: #fff; border: 2px solid #3498db; color: #3498db; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .option-btn.selected { background: #3498db; color: white; }
        
        .feedback { font-weight: bold; margin-top: 15px; padding: 12px; border-radius: 5px; display: none; }
        .feedback.correct { background: #eafaf1; color: #27ae60; border: 1px solid #27ae60; }
        .feedback.wrong { background: #fdf2f2; color: #e74c3c; border: 1px solid #e74c3c; }

        .btn-check { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; margin-top: 20px; margin-bottom: 50px; }
        .tag { display: inline-block; background: #e1ecf4; color: #39739d; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; margin-bottom: 5px; font-weight: bold; }
        #date-display { font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🏆 AMC 8 Master Training Hub</h1>
    <p>Daily Practice for Success | Date: <span id="date-display"></span></p>
</header>

<div class="sticky-stats">
    <div class="stat-card">
        <strong>⏱ Session Timer</strong>
        <div class="timer-display" id="timer">00:00</div>
        <button onclick="resetTimer()" style="font-size:0.7rem; cursor:pointer;">Reset Timer</button>
    </div>
    <div class="stat-card">
        <strong>📊 Training Progress</strong>
        <div class="progress-bg"><div id="progressBar" class="progress-fill"></div></div>
        <div id="progressText" style="font-size: 0.9rem; font-weight: bold;">0% Answered</div>
    </div>
</div>

<div id="main-content">
    <h2>📅 March 25, 2026: Today's Practice</h2>
    <div class="card" id="mar25-container"></div>

    <h2>📅 March 24, 2026: Yesterday's Review</h2>
    <div class="card" id="mar24-container"></div>
</div>

<button class="btn-check" onclick="checkAll()">Check All My Answers</button>

<script>
    // COMBINED DATA
    const questions = [
        // MARCH 25 - NEW (Examples)
        { id: 'm25_1', date: 'mar25', tag: '2024 #7', q: "Average of five numbers is 10. Sixth number added makes new average 12. What is the sixth number?", opts: ['12','18','22','24','30'], ans: '22' },
        { id: 'm25_2', date: 'mar25', tag: 'Practice #11', q: "If 4x - 7 = 21, what is x + 3?", opts: ['7','10','11','13','14'], ans: '10' },

        // MARCH 24 - DATA FROM YOUR LIST
        { id: 'r1', date: 'mar24', tag: '2024 #1', q: "What is the ones digit of (222 - 22) - (2 - 2 - 2 - 2 - 2)?", opts: ['0','2','4','6','8'], ans: '6' },
        { id: 'r2', date: 'mar24', tag: '2024 #2', q: "Value of 44/11 + 110/44 + 44/1100 in decimal?", opts: ['6.44','6.50','6.54','6.94','7.04'], ans: '6.54' },
        { id: 'r3', date: 'mar24', tag: '2024 #4', q: "Yunji added integers 1 to 9 but left one out. Sum was a square. Which left out?", opts: ['5','6','7','8','9'], ans: '9' },
        { id: 'r4', date: 'mar24', tag: '2023 #6', q: "Value of (8 x 4 + 2) - (8 + 4 x 2)?", opts: ['0','2','12','18','34'], ans: '18' },
        { id: 'r5', date: 'mar24', tag: '2023 #7', q: "A lake has 250 trout. A sample of 180 fish has 30 trout. Total fish in lake?", opts: ['1200','1500','1800','2000','3000'], ans: '1500' },
        { id: 'p1', date: 'mar24', tag: 'Practice #1', q: "What is the value of (20 x 24) - (20 + 24)?", opts: ['436','440','456','480','524'], ans: '436' },
        { id: 'p2', date: 'mar24', tag: 'Practice #2', q: "Temp was -5°C. Rose 12°C by noon, fell 7°C by 6PM. Final temp?", opts: ['-12°C','-5°C','0°C','5°C','14°C'], ans: '0°C' },
        { id: 'p3', date: 'mar24', tag: 'Practice #3', q: "3 identical candy bars cost $5.25. How much for 5?", opts: ['$7.00','$8.75','$9.25','$10.50','$11.25'], ans: '$8.75' },
        { id: 'p4', date: 'mar24', tag: 'Practice #4', q: "What is the ones digit of the product 13 x 17 x 19?", opts: ['1','3','7','9','0'], ans: '9' },
        { id: 'p5', date: 'mar24', tag: 'Practice #5', q: "Rectangular garden perimeter is 40m. Length is 12m. Area?", opts: ['48','96','144','336','480'], ans: '96' },
        { id: 'p6', date: 'mar24', tag: 'Practice #6', q: "Largest value: (1/2 of 40), (25% of 100), (0.2 x 80), or (5+6+7)?", opts: ['1/2 of 40','25% of 100','0.2 x 80','5+6+7'], ans: '25% of 100' },
        { id: 'p7', date: 'mar24', tag: 'Practice #7', q: "Bag has 4 red, 5 blue, 11 green. Probability it is NOT green?", opts: ['4/20','5/20','9/20','11/20','1/2'], ans: '9/20' },
        { id: 'p8', date: 'mar24', tag: 'Practice #8', q: "Average (mean) of the first five prime numbers?", opts: ['5.0','5.6','5.8','6.2','7.0'], ans: '5.6' },
        { id: 'p9', date: 'mar24', tag: 'Practice #9', q: "Square area is 64. Perimeter?", opts: ['16','32','64','128','256'], ans: '32' },
        { id: 'p10', date: 'mar24', tag: 'Practice #10', q: "If 3x + 5 = 26, value of 2x - 1?", opts: ['7','11','13','15','21'], ans: '13' }
    ];

    let userSelections = JSON.parse(localStorage.getItem('amc8_master_hub_save')) || {};

    // TIMER LOGIC
    let totalSeconds = 0;
    let timerVar = setInterval(function() {
        totalSeconds++;
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        document.getElementById("timer").innerHTML = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
    }, 1000);

    function resetTimer() {
        totalSeconds = 0;
        document.getElementById("timer").innerHTML = "00:00";
    }

    // RENDER LOGIC
    function draw() {
        const m25 = document.getElementById('mar25-container');
        const m24 = document.getElementById('mar24-container');
        m25.innerHTML = ""; m24.innerHTML = "";

        questions.forEach(q => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.innerHTML = `
                <span class="tag">${q.tag}</span>
                <span class="question-text">${q.q}</span>
                <div class="options-grid">
                    ${q.opts.map(o => `<button class="option-btn ${userSelections[q.id] === o ? 'selected' : ''}" onclick="pick('${q.id}','${o}')">${o}</button>`).join('')}
                </div>
                <div id="fb-${q.id}" class="feedback"></div>
            `;
            if(q.date === 'mar25') m25.appendChild(block);
            else m24.appendChild(block);
        });
        updateProgress();
    }

    function pick(qid, val) {
        userSelections[qid] = val;
        localStorage.setItem('amc8_master_hub_save', JSON.stringify(userSelections));
        draw();
    }

    function updateProgress() {
        const count = Object.keys(userSelections).length;
        const total = questions.length;
        const p = Math.round((count / total) * 100);
        document.getElementById('progressBar').style.width = p + "%";
        document.getElementById('progressText').innerText = `${p}% Answered (${count}/${total})`;
    }

    function checkAll() {
        questions.forEach(q => {
            const fb = document.getElementById(`fb-${q.id}`);
            if(!userSelections[q.id]) {
                fb.style.display = "none";
                return;
            }
            fb.style.display = "block";
            if(userSelections[q.id] === q.ans) {
                fb.innerText = "✅ Correct!";
                fb.className = "feedback correct";
            } else {
                fb.innerText = `❌ Wrong. Correct Answer: ${q.ans}`;
                fb.className = "feedback wrong";
            }
        });
    }

    document.getElementById('date-display').innerText = new Date().toLocaleDateString();
    draw();
</script>
</body>
</html>
